<!doctype html>
<html lang="nl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Handtekening Editor - Technolab Leiden</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
                        <!-- Tab: persoonlijke gegevens -->
                        <div class="tab-content active" data-content="personal">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Naam</label>
                                    <input type="text" id="name" placeholder="Volledige naam">
                                </div>

                                <div class="form-group">
                                    <label>Functie</label>
                                    <input type="text" id="role" placeholder="Jouw functie">
                                </div>

                                <div class="form-group full-width">
                                    <label>Werkdagen</label>
                                    <div id="daysContainer" class="days-grid">
                                        <label class="day-label">
                                            <input type="checkbox" class="day-checkbox" value="ma">
                                            <span>ma</span>
                                        </label>
                                        <label class="day-label">
                                            <input type="checkbox" class="day-checkbox" value="di">
                                            <span>di</span>
                                        </label>
                                        <label class="day-label">
                                            <input type="checkbox" class="day-checkbox" value="wo">
                                            <span>wo</span>
                                        </label>
                                        <label class="day-label">
                                            <input type="checkbox" class="day-checkbox" value="do">
                                            <span>do</span>
                                        </label>
                                        <label class="day-label">
                                            <input type="checkbox" class="day-checkbox" value="vr">
                                            <span>vr</span>
                                        </label>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Telefoon (mobiel)</label>
                                    <input type="tel" id="phone" placeholder="+31 6 12345678"
                                        pattern="^\+?[0-9\s-]{9,}$" title="Voer een geldig telefoonnummer in">
                                    <div id="phoneError" class="error-message" style="display:none;">
                                        Voer een geldig telefoonnummer in
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>E-mail</label>
                                    <input type="text" id="email" placeholder="naam@technolableiden.nl">
                                    <div id="emailSuggestion" class="email-suggestion hidden">
                                        <strong>@technolableiden.nl</strong>
                                    </div>
                                </div>

                                <div class="form-group full-width checkbox-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="showBanner" checked>
                                        <span>Toon Meesterchallenge-banner</span>
                                    </label>
                                </div>
                            </div>
                        </div>
</body>
</html>
